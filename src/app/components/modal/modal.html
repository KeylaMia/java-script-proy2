@if (isOpen) {
  <div class="modal-backdrop-custom" (click)="closeModal()">
    
    <div class="modal-dialog-custom" (click)="$event.stopPropagation()">
      
      <div class="modal-header-custom" [ngClass]="'bg-' + type">
        <h5 class="modal-title-custom">
          @if (type === 'success') { <i class="bi bi-check-circle-fill me-2"></i> }
          @if (type === 'danger') { <i class="bi bi-exclamation-triangle-fill me-2"></i> }
          @if (type === 'info') { <i class="bi bi-info-circle-fill me-2"></i> }
          @if (type === 'warning') { <i class="bi bi-exclamation-circle-fill me-2"></i> }
          {{ title }}
        </h5>
        <button type="button" class="btn-close-custom" (click)="closeModal()">&times;</button>
      </div>

      <div class="modal-body-custom">
        <p>{{ message }}</p>
      </div>

      <div class="modal-footer-custom">
        <button 
          type="button" 
          class="btn btn-custom" 
          [ngClass]="'btn-' + type" 
          (click)="closeModal()">
          {{ btnText }}
        </button>
      </div>

    </div>
  </div>
}
