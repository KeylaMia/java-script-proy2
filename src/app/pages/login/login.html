<div class="login-container d-flex align-items-center justify-content-center bg-light">
  <div class="card border-0 shadow-sm rounded-4 login-card bg-white">
    <div class="card-body p-4 p-sm-5">
      
      <div class="text-center mb-4">
        <h3 class="fw-bold text-dark mb-1">Soft Consultores</h3>
        <p class="text-muted small">Ingresa a tu portal privado de soluciones</p>
      </div>

      @if (errorLogin) {
        <div class="alert alert-danger border-0 small mb-4" role="alert">
          <i class="bi bi-exclamation-circle-fill me-2"></i> {{ errorLogin }}
        </div>
      }

      <form class="needs-validation" [class.was-validated]="loginValidated" novalidate (submit)="handleLoginSubmit($event)">
        
        <div class="mb-3">
          <label class="form-label text-muted small fw-bold">Correo Electrónico</label>
          <div class="input-group">
            <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-envelope"></i></span>
            <input 
              type="email" 
              class="form-control bg-light border-start-0" 
              placeholder="nombre@empresa.com"
              [(ngModel)]="correo" 
              name="emailUser" 
              required>
            <div class="invalid-feedback">Por favor, ingresa un correo válido.</div>
          </div>
        </div>

        <div class="mb-4">
          <div class="d-flex justify-content-between align-items-center mb-1">
            <label class="form-label text-muted small fw-bold mb-0">Contraseña</label>
            <a href="#" class="text-primary text-xs text-decoration-none">¿La olvidaste?</a>
          </div>
          <div class="input-group">
            <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-lock"></i></span>
            <input 
              type="password" 
              class="form-control bg-light border-start-0" 
              placeholder="••••••••"
              [(ngModel)]="contrasena" 
              name="passUser" 
              required>
            <div class="invalid-feedback">Ingresa tu contraseña para continuar.</div>
          </div>
        </div>

        <button type="submit" class="btn btn-primary w-100 py-2.5 fw-bold rounded-3 shadow-sm" [disabled]="cargando">
          @if (cargando) {
            <span class="spinner-border spinner-border-sm me-2" role="status"></span> Autenticando...
          } @else {
            Iniciar Sesión <i class="bi bi-arrow-right ms-1"></i>
          }
        </button>

      </form>

      <div class="text-center mt-4">
        <p class="text-muted small mb-0">¿Aún no eres cliente? 
          <a routerLink="/contacto" class="text-primary fw-semibold text-decoration-none">Contáctanos aquí</a>
        </p>
      </div>

    </div>
  </div>
</div>
